{% extends 'layout.html' %} {% block content %}

<div class="container py-4">
  <h1 class="mb-3">Set Block Values</h1>
  <p class="text-muted">
    Adjust each selected feature below. Values start at their minimum.
  </p>

  <form id="configForm" action="/predict" method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3 mb-4">
      {% for feature in selected %} {% set params = all_features[feature] %}
      <div class="col">
        <label class="form-label fw-semibold">
          {{ feature.replace("_", " ").title() }}
        </label>
        <div class="d-flex justify-content-between text-muted small mb-1">
          <span>min: {{ params.min | int }}</span>
          <span>max: {{ params.max | int }}</span>
        </div>
        <input
          type="number"
          class="form-control"
          name="{{ feature }}"
          min="{{ params.min | int }}"
          max="{{ params.max | int }}"
          value="{{ params.min | int }}"
        />
      </div>
      {% endfor %}
    </div>

    <a href="/" class="btn btn-secondary me-2">← Back</a>
    <button type="submit" class="btn btn-success">Predict Biome →</button>
  </form>
</div>
{% endblock %}
